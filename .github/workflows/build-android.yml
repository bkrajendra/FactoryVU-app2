# Builds release APK and AAB. Signing:
# - If repo secrets KEYSTORE_BASE64, KEYSTORE_PASSWORD, KEYSTORE_ALIAS, KEY_PASSWORD are set:
#   uses that keystore (same key every build → use for Play Store).
# - Otherwise: creates a new CI keystore each run (for testing only; not for production updates).
name: Build Android APK and AAB

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  NODE_VERSION: "22"
  JAVA_VERSION: "21"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: ${{ env.JAVA_VERSION }}
          cache: "gradle"

      - name: Install dependencies
        run: npm ci

      - name: Compute build version
        id: buildver
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          BUILD_NUMBER="${GITHUB_RUN_NUMBER}"
          echo "PKG_VERSION=${PKG_VERSION}" >> "$GITHUB_OUTPUT"
          echo "BUILD_NUMBER=${BUILD_NUMBER}" >> "$GITHUB_OUTPUT"
          # Android versionName can't contain spaces; keep it readable and monotonic.
          echo "ANDROID_VERSION_NAME=${PKG_VERSION}+${BUILD_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Build web app
        run: npm run build -- --configuration=production

      - name: Sync Capacitor Android
        run: npx cap sync android

      # Decide signing: use release keystore from secrets if all four are set; else use CI keystore.
      - name: Detect signing mode
        id: signing
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ] && [ -n "${{ secrets.KEYSTORE_PASSWORD }}" ] && [ -n "${{ secrets.KEYSTORE_ALIAS }}" ] && [ -n "${{ secrets.KEY_PASSWORD }}" ]; then
            echo "USE_RELEASE_KEYSTORE=true" >> $GITHUB_ENV
            echo "mode=release" >> $GITHUB_OUTPUT
          else
            echo "USE_RELEASE_KEYSTORE=false" >> $GITHUB_ENV
            echo "mode=ci" >> $GITHUB_OUTPUT
          fi

      # Production: one keystore from secrets (required for Play Store updates).
      - name: Set up release signing (from secrets)
        if: env.USE_RELEASE_KEYSTORE == 'true'
        run: |
          # Gradle expects storeFile relative to the app module, so put it under android/app/
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/release.keystore
          printf "storeFile=release.keystore\nstorePassword=%s\nkeyAlias=%s\nkeyPassword=%s\n" \
            "${{ secrets.KEYSTORE_PASSWORD }}" "${{ secrets.KEYSTORE_ALIAS }}" "${{ secrets.KEY_PASSWORD }}" \
            > android/keystore.properties

      # Testing/PRs: new keystore each run (do not use for Play Store).
      - name: Create CI keystore and properties
        if: env.USE_RELEASE_KEYSTORE != 'true'
        run: |
          # For CI, also place keystore under android/app/ so storeFile resolves correctly
          keytool -genkeypair -v \
            -storetype PKCS12 \
            -keystore android/app/ci-release.keystore \
            -alias ci \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=CI, OU=CI, O=CI, L=CI, S=CI, C=US"
          echo "storeFile=ci-release.keystore" > android/keystore.properties
          echo "storePassword=android" >> android/keystore.properties
          echo "keyAlias=ci" >> android/keystore.properties
          echo "keyPassword=android" >> android/keystore.properties

      - name: Build release APK
        # working-directory: android
        run: cd android && ./gradlew assembleRelease -PVERSION_CODE=${{ steps.buildver.outputs.BUILD_NUMBER }} -PVERSION_NAME=${{ steps.buildver.outputs.ANDROID_VERSION_NAME }}

      - name: Build release AAB
        # working-directory: android
        run: cd android && ./gradlew bundleRelease -PVERSION_CODE=${{ steps.buildver.outputs.BUILD_NUMBER }} -PVERSION_NAME=${{ steps.buildver.outputs.ANDROID_VERSION_NAME }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
      - name: Rename APK/AAB
        run: |
          cp android/app/build/outputs/apk/release/app-release.apk FactoryVU.apk
          cp android/app/build/outputs/bundle/release/app-release.aab FactoryVU.aab
      - name: Read version from package.json
        id: version
        run: |
          echo "VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: FactoryVU v${{ steps.version.outputs.VERSION }}
          files: |
            FactoryVU.apk
            FactoryVU.aab
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
