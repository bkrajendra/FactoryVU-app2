name: Build Android\n\non: push:\n  branches:\n    - main\n\njobs:\n  build:\n    runs-on: ubuntu-latest\n\n    steps:\n      - name: Checkout code\n        uses: actions/checkout@v2\n\n      - name: Set up Node.js\n        uses: actions/setup-node@v2\n        with:\n          node-version: '14'\n\n      - name: Install dependencies\n        run: npm install\n\n      - name: Read version from package.json\n        id: get_version\n        run: |\n          VERSION=$(jq -r .version package.json)\n          echo "version=$VERSION" >> $GITHUB_ENV\n\n      - name: Check for existing release\n        id: check_release\n        run: |\n          if git tag | grep -q "$VERSION"; then\n            echo "exists=true" >> $GITHUB_ENV\n          else\n            echo "exists=false" >> $GITHUB_ENV\n          fi\n\n      - name: Create or update release\n        id: release\n        run: |\n          if [ "${{ env.exists }}" == "false" ]; then\n            echo "Creating new release for version $VERSION"\n            gh release create "$VERSION" "path/to/your/apk/file.apk" "path/to/your/aab/file.aab" --title "Release $VERSION" --notes "Release notes"\n          else\n            echo "Updating existing release for version $VERSION"\n            # Code to update the existing release here.\n            gh release upload "$VERSION" "path/to/your/new/apk/file.apk" "path/to/your/new/aab/file.aab"\n          fi\n\n      - name: Build APK\n        run: ./gradlew assembleRelease\n
