<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Home</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <div class="home-content">
    <section class="welcome">
      <ng-container *ngIf="hasApiKey; else apiKeySetup">
        <h1>Welcome</h1>
        <p class="sub">Manage your devices and sensors from one place.</p>
      </ng-container>
      <ng-template #apiKeySetup>
        <h1>Welcome</h1>
        <p class="sub">Go to Settings to add your API key to load devices.</p>
        <div class="setup-actions">
          <ion-button (click)="goToSettings()" fill="solid">
            <ion-icon name="key-outline"></ion-icon>
            Open Settings
          </ion-button>
        </div>
      </ng-template>
    </section>

    <section class="quick-action">
      <ion-button expand="block" (click)="goToDevices()" class="devices-btn">
        <ion-icon name="cube-outline"></ion-icon>
        View Devices
      </ion-button>
    </section>

    <section class="stats">
      <h2>System info</h2>
      <div class="stat-cards">
        <div class="stat-card">
          <span class="stat-value">{{ counts.total }}</span>
          <span class="stat-label">Total devices</span>
        </div>
        <div class="stat-card active">
          <span class="stat-value">{{ counts.active }}</span>
          <span class="stat-label">Active</span>
        </div>
        <div class="stat-card inactive">
          <span class="stat-value">{{ counts.inactive }}</span>
          <span class="stat-label">Inactive</span>
        </div>
      </div>
      <p class="version-info">FactoryVU v{{ appVersion }}</p>
    </section>
  </div>
</ion-content>
